# Installation du CSI S3 de Yandex (compatible avec MinIO) :
# helm repo add yandex-s3 https://yandex-cloud.github.io/k8s-csi-s3/charts
# helm install csi-s3 yandex-s3/csi-s3 --namespace kube-system

---
apiVersion: v1
kind: Secret
metadata:
  name: csi-s3-secret  # Nom du secret attendu par le CSI S3 de Yandex
  namespace: default
type: Opaque
stringData:
  accessKeyID: "minioadmin"
  secretAccessKey: "minioadmin"
  # svc = minio, ns = storage, cluster.local = suffixe DNS interne de Kubernetes, port = 9000
  endpoint: "http://minio.storage.svc.cluster.local:9000"  # ← DNS interne
  region: "us-east-1"

--- 
# ATTENTION, va être créer par helm
# apiVersion: storage.k8s.io/v1
# kind: StorageClass
# metadata:
