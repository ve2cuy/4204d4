---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  annotations:
    csi.storage.k8s.io/bucket: "yo.test.420"  # ← utilise le bucket existant
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: csi-s3

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          volumeMounts:
            - name: s3-volume
              mountPath: /usr/share/nginx/html  # ← bucket monté ici
      volumes:
        - name: s3-volume
          persistentVolumeClaim:
            claimName: minio-pvc
